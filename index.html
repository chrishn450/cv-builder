<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CV Builder — Start</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .startWrap{max-width:1000px;margin:44px auto;padding:0 18px}
    .startTitle{font-size:42px;letter-spacing:.2px;margin:0 0 6px}
    .startSub{color:#e6e6e6;opacity:1;margin:0 0 22px;max-width:70ch}
    .startCard *{color:#111}
    .startCard .muted{color:#333 !important; opacity:1 !important}
    .startCard{
      background:rgba(255,255,255,.96);
      color:#111;
      border:1px solid rgba(0,0,0,.10);
      border-radius:18px;
      padding:22px;
      box-shadow:0 12px 30px rgba(0,0,0,.18);
    }
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    @media (max-width:860px){.grid{grid-template-columns:1fr}}
    .tile{border:1px solid rgba(0,0,0,.10);border-radius:16px;padding:18px}
    .tile h2{margin:0 0 6px;font-size:26px}
    .muted{color:#444;opacity:1;margin:0 0 12px;line-height:1.35}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:12px 14px;border-radius:12px;border:1px solid rgba(0,0,0,.12);
      background:#111;color:#fff;cursor:pointer;font-weight:700;
    }
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .btn.secondary{background:#fff;color:#111}
    .fileName{font-size:14px;opacity:.8}
    .status{margin-top:10px;font-size:14px;min-height:18px}
    .spinner{
      width:14px;height:14px;border-radius:999px;border:2px solid rgba(0,0,0,.25);
      border-top-color:rgba(0,0,0,.9);display:inline-block;
      animation:spin .9s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    input[type="file"]{display:none}
  </style>
</head>
<body>
  <div class="startWrap">
    <h1 class="startTitle">CV Builder</h1>
    <p class="startSub">Choose how you want to start.</p>

    <div class="startCard">
      <div class="grid">
        <div class="tile">
          <h2>Upload your old CV (PDF)</h2>
          <p class="muted">We’ll extract the text and let AI prefill the template for you.</p>

          <input id="oldCvFile" type="file" accept="application/pdf" style="display:none" />
          <div class="row">
            <button id="chooseBtn" class="btn secondary" type="button">Choose PDF</button>
            <div id="fileName" class="fileName">No file selected</div>
          </div>

          <div style="height:12px"></div>

          <button id="uploadBtn" class="btn" type="button">Upload &amp; Prefill</button>
          <div id="uploadStatus" class="status"></div>
        </div>

        <div class="tile">
          <h2>Build from scratch</h2>
          <p class="muted">Start with a blank template and fill it in yourself.</p>
          <button id="goBtn" class="btn secondary" type="button">Go to template</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Start page: parse PDF -> store text -> open builder
    const PENDING_TEXT_KEY = "cv_builder_pending_import_text";
    const PENDING_LANG_KEY = "cv_builder_pending_import_lang";

    function setStatus(text, kind) {
      const el = document.getElementById("uploadStatus");
      if (!el) return;
      el.textContent = text || "";
      el.classList.remove("ok","err","busy");
      if (kind) el.classList.add(kind);
    }

    async function parsePdf(file) {
      const fd = new FormData();
      fd.append("file", file);
      const r = await fetch("/api/parse-cv", { method:"POST", body: fd });
      const j = await r.json().catch(() => null);
      if (!r.ok) throw new Error(j?.error || "Failed to parse PDF");
      return String(j?.text || "");
    }

    document.getElementById("goBtn").addEventListener("click", () => {
      location.href = "/builder.html";
    });

    document.getElementById("chooseBtn").addEventListener("click", () => {
      const inp = document.getElementById("oldCvFile");
      if (!inp) return;
      inp.value = ""; // allow choosing the same file again
      inp.click();
    });

    document.getElementById("oldCvFile").addEventListener("change", () => {
      const file = document.getElementById("oldCvFile").files?.[0];
      const nameEl = document.getElementById("fileName");
      nameEl.textContent = file ? file.name : "No file selected";
      setStatus("");
    });

    document.getElementById("uploadBtn").addEventListener("click", async () => {
      const file = document.getElementById("oldCvFile").files?.[0];
      if (!file) { setStatus("Choose a PDF first.", "err"); return; }

      try {
        document.getElementById("uploadBtn").disabled = true;
        setStatus("Parsing PDF…", "busy");

        const text = await parsePdf(file);
        if (!text.trim()) {
          setStatus("We couldn't extract text from this PDF. Try a different file.", "err");
          return;
        }

        const lower = text.toLowerCase();
        const looksNo = /\b(og|ikke|som|med|arbeid|erfaring|utdanning|sertifisering|førerkort|språk)\b/.test(lower);
        try { localStorage.setItem(PENDING_TEXT_KEY, text); } catch {}
        try { localStorage.setItem(PENDING_LANG_KEY, looksNo ? "no" : "en"); } catch {}
        setStatus("Opening the editor…", "ok");
        location.href = "/builder.html";
      } catch (e) {
        setStatus(e?.message || "Upload failed.", "err");
      } finally {
        document.getElementById("uploadBtn").disabled = false;
      }
    });
  </script>
</body>
</html>
