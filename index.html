<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CV Builder — Start</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .startWrap{max-width:1000px;margin:44px auto;padding:0 18px}
    .startTitle{font-size:42px;letter-spacing:.2px;margin:0 0 6px}
    .startSub{color:#e6e6e6;opacity:1;margin:0 0 22px;max-width:70ch}
    .startCard *{color:#111}
    .startCard{
      background:rgba(255,255,255,.96);
      color:#111;
      border:1px solid rgba(0,0,0,.10);
      border-radius:18px;
      padding:22px;
      box-shadow:0 12px 30px rgba(0,0,0,.18);
    }
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    @media (max-width:860px){.grid{grid-template-columns:1fr}}
    .tile{border:1px solid rgba(0,0,0,.10);border-radius:16px;padding:18px}
    .tile h2{margin:0 0 6px;font-size:26px}
    .muted{color:#444;opacity:1;margin:0 0 12px;line-height:1.35}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:12px 14px;border-radius:12px;border:1px solid rgba(0,0,0,.12);
      background:#111;color:#fff;cursor:pointer;font-weight:700;
    }
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .btn.secondary{background:#fff;color:#111}
    .fileName{font-size:14px;opacity:.8}
    .status{margin-top:10px;font-size:14px;min-height:18px}
    .spinner{
      width:14px;height:14px;border-radius:999px;border:2px solid rgba(0,0,0,.25);
      border-top-color:rgba(0,0,0,.9);display:inline-block;
      animation:spin .9s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    input[type="file"]{display:none}
  </style>
</head>
<body>
  <div class="startWrap">
    <h1 class="startTitle">CV Builder</h1>
    <p class="startSub">Choose how you want to start.</p>

    <div class="startCard">
      <div class="grid">
        <div class="tile">
          <h2>Upload your old CV (PDF)</h2>
          <p class="muted">We’ll extract the text and let AI prefill the template for you.</p>

          <input id="oldCvFile" type="file" accept="application/pdf" />
          <div class="row">
            <button id="chooseBtn" class="btn secondary" type="button">Choose PDF</button>
            <div id="fileName" class="fileName">No file selected</div>
          </div>

          <div style="height:12px"></div>

          <button id="uploadBtn" class="btn" type="button">Upload &amp; Prefill</button>
          <div id="uploadStatus" class="status"></div>
        </div>

        <div class="tile">
          <h2>Start from template</h2>
          <p class="muted">Open the editor and build as before.</p>
          <button id="goBtn" class="btn secondary" type="button">Go to template</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_PENDING_TEXT = "pending_cv_import_text_v1";

    const oldCvFile = document.getElementById("oldCvFile");
    const chooseBtn = document.getElementById("chooseBtn");
    const fileName = document.getElementById("fileName");
    const uploadBtn = document.getElementById("uploadBtn");
    const statusEl = document.getElementById("uploadStatus");

    function setStatus(text, loading=false){
      statusEl.innerHTML = loading ? '<span class="spinner"></span> ' + text : text;
    }

    chooseBtn.addEventListener("click", () => {
      oldCvFile.value = ""; // allow selecting the same file again
      oldCvFile.click();
    });

    oldCvFile.addEventListener("change", () => {
      const f = oldCvFile.files && oldCvFile.files[0];
      fileName.textContent = f ? f.name : "No file selected";
    });

    document.getElementById("goBtn").addEventListener("click", () => {
      location.href = "/builder.html";
    });

    async function parsePdf(file) {
      const fd = new FormData();
      fd.append("file", file);
      const r = await fetch("/api/parse-cv", { method:"POST", body: fd });
      const j = await r.json().catch(() => null);
      if (!r.ok) throw new Error(j && j.error ? j.error : "Failed to parse PDF");
      return (j && j.text ? j.text : "");
    }

    uploadBtn.addEventListener("click", async () => {
      const file = oldCvFile.files && oldCvFile.files[0];
      if (!file) { setStatus("Choose a PDF first."); return; }

      uploadBtn.disabled = true;
      chooseBtn.disabled = true;

      try {
        setStatus("Parsing PDF…", true);
        const text = await parsePdf(file);

        // Store text, then let the editor do the AI import (better results with snapshot + template state)
        localStorage.setItem(STORAGE_PENDING_TEXT, text);

        setStatus("Opening template…", true);
        location.href = "/builder.html";
      } catch (e) {
        setStatus(e && e.message ? e.message : "Import failed.");
      } finally {
        uploadBtn.disabled = false;
        chooseBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
