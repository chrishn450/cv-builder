<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CV Builder — Start</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .startWrap{max-width:900px;margin:40px auto;padding:0 16px}
    .startCard{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:16px;padding:20px}
    .row{display:flex;gap:16px;flex-wrap:wrap}
    .col{flex:1;min-width:260px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 14px;border-radius:12px;border:1px solid rgba(0,0,0,.12);background:#111;color:#fff;cursor:pointer}
    .btn.secondary{background:#fff;color:#111}
    .muted{opacity:.75}
    .status{margin-top:12px;font-size:.95em}
  </style>
</head>
<body>
  <div class="startWrap">
    <h1>CV Builder</h1>
    <p class="muted">Velg hvordan du vil starte:</p>

    <div class="startCard">
      <div class="row">
        <div class="col">
          <h2>Last opp gammel CV (PDF)</h2>
          <p class="muted">Vi henter ut tekst og lar AI fylle inn templaten (inkl. seksjoner + nye bokser) så godt den kan.</p>

          <input id="oldCvFile" type="file" accept="application/pdf" />
          <div style="height:10px"></div>
          <button id="uploadBtn" class="btn" type="button">Upload &amp; Prefill</button>
          <div id="uploadStatus" class="status muted"></div>
        </div>

        <div class="col">
          <h2>Gå rett til template</h2>
          <p class="muted">Åpne editoren og bygg som før.</p>
          <button id="goBtn" class="btn secondary" type="button">Go to template</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "cv_builder_user_overrides_structured_v4";

    function setDeep(obj, path, value) {
      const parts = String(path || "").split(".");
      let cur = obj;
      for (let i = 0; i < parts.length - 1; i++) {
        const k = parts[i];
        if (!cur[k] || typeof cur[k] !== "object") cur[k] = {};
        cur = cur[k];
      }
      cur[parts[parts.length - 1]] = value;
    }

    function applyPatches(state, patches) {
      (patches || []).forEach((p) => {
        if (!p || p.op !== "set" || typeof p.path !== "string") return;
        setDeep(state, p.path, p.value);
      });
      return state;
    }

    async function parsePdf(file) {
      const fd = new FormData();
      fd.append("file", file);
      const r = await fetch("/api/parse-cv", { method:"POST", body: fd });
      const j = await r.json().catch(() => null);
      if (!r.ok) throw new Error(j?.error || "Failed to parse PDF");
      return String(j?.text || "");
    }

    async function aiImport(cvText) {
      const message = (`IMPORT_OLD_CV\n\nHere is the old CV text:\n\n${cvText}`).slice(0, 120000);

      const r = await fetch("/api/ai", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          message,
          language: "en",
          snapshot: {},
          history: []
        })
      });
      const j = await r.json().catch(() => null);
      if (!r.ok) throw new Error(j?.error || "AI import failed");
      return j;
    }

    document.getElementById("goBtn").addEventListener("click", () => {
      location.href = "/builder.html";
    });

    document.getElementById("uploadBtn").addEventListener("click", async () => {
      const file = document.getElementById("oldCvFile").files?.[0];
      const status = document.getElementById("uploadStatus");
      if (!file) { status.textContent = "Velg en PDF først."; return; }

      try {
        status.textContent = "Leser PDF…";
        const text = await parsePdf(file);

        status.textContent = "Lar AI fylle inn…";
        const out = await aiImport(text);

        const base = { data:{}, sections:{}, ui:{ lang:"en", template:"" } };
        const patches = (out?.suggestions || []).flatMap((s) => s?.patches || []);
        applyPatches(base, patches);

        localStorage.setItem(STORAGE_KEY, JSON.stringify(base));

        status.textContent = "Ferdig — åpner templaten…";
        location.href = "/builder.html";
      } catch (e) {
        status.textContent = e?.message || "Import feilet.";
      }
    });
  </script>
</body>
</html>
