<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CV Builder — Start</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .startWrap{max-width:900px;margin:40px auto;padding:0 16px}
    .startCard{background:#fff;color:#111;border:1px solid rgba(0,0,0,.10);border-radius:16px;padding:20px}
    .row{display:flex;gap:16px;flex-wrap:wrap}
    .col{flex:1;min-width:260px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 14px;border-radius:12px;border:1px solid rgba(0,0,0,.12);background:#111;color:#fff;cursor:pointer}
    .btn.secondary{background:#fff;color:#111}
    .muted{opacity:.78}
    .status{margin-top:12px;font-size:.95em}
    .spinner{display:inline-block;width:12px;height:12px;border-radius:999px;border:2px solid rgba(0,0,0,.25);border-top-color:rgba(0,0,0,.85);animation:spin 0.9s linear infinite;vertical-align:-2px;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="startWrap">
    <h1>CV Builder</h1>
    <p class="muted">Choose how you want to start:</p>

    <div class="startCard">
      <div class="row">
        <div class="col">
          <h2>Upload your old CV (PDF)</h2>
          <p class="muted">We’ll extract text and let AI fill in the template (including sections + new blocks) as best as it can.</p>

          <input id="oldCvFile" type="file" accept="application/pdf" />
          <div style="height:10px"></div>
          <button id="uploadBtn" class="btn" type="button">Upload &amp; Prefill</button>
          <div id="uploadStatus" class="status muted"></div>
        </div>

        <div class="col">
          <h2>Start from template</h2>
          <p class="muted">Open the editor and build as before.</p>
          <button id="goBtn" class="btn secondary" type="button">Go to template</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const PENDING_TEXT_KEY = "cv_builder_pending_import_text";
    const PENDING_LANG_KEY = "cv_builder_pending_import_lang";

    function detectLang(text) {
      const t = String(text || "").toLowerCase();
      const hits = [
        " og ", " jeg ", " utdanning", " erfaring", " ferdigheter", " språk", " sammendrag",
        " nåværende", " ansvar", " stilling", " arbeids", " sertifikat", " kurs"
      ].reduce((acc, w) => acc + (t.includes(w) ? 1 : 0), 0);
      return hits >= 2 ? "no" : "en";
    }

    async function parsePdf(file) {
      const fd = new FormData();
      fd.append("file", file);
      const r = await fetch("/api/parse-cv", { method:"POST", body: fd });
      const j = await r.json().catch(() => null);
      if (!r.ok) throw new Error(j?.error || "Failed to parse PDF");
      return String(j?.text || "");
    }

    function setLoading(statusEl, isLoading, text) {
      if (!statusEl) return;
      statusEl.innerHTML = isLoading ? `<span class="spinner"></span>${text}` : text;
    }

    document.getElementById("goBtn").addEventListener("click", () => {
      location.href = "/builder.html";
    });

    document.getElementById("uploadBtn").addEventListener("click", async () => {
      const file = document.getElementById("oldCvFile").files?.[0];
      const status = document.getElementById("uploadStatus");
      const btn = document.getElementById("uploadBtn");
      if (!file) { if(status) status.textContent = "Choose a PDF first."; return; }

      try {
        btn.disabled = true;
        setLoading(status, true, "Parsing PDF…");
        const text = await parsePdf(file);

        // store for builder to import with full template context (better results)
        const lang = detectLang(text);
        localStorage.setItem(PENDING_TEXT_KEY, text);
        localStorage.setItem(PENDING_LANG_KEY, lang);

        setLoading(status, true, "Opening template…");
        location.href = "/builder.html";
      } catch (e) {
        btn.disabled = false;
        if (status) status.textContent = e?.message || "Import failed.";
      }
    });
  </script>
</body>
</html>
